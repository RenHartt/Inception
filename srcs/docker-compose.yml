services:

  mariadb:
    build: requirements/mariadb
    container_name: mariadb
    env_file:
      - .env
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - network
    expose:
      - "3306"
    restart : on-failure

  wordpress:
    build: requirements/wordpress
    container_name: wordpress
    env_file:
      - .env
    volumes:
      - wordpress_data:/var/www/html
    networks:
      - network
    depends_on:
      - mariadb
    expose:
      - "9000"
    restart : on-failure
 
  nginx:
    build: requirements/nginx
    container_name: nginx
    volumes:
      - wordpress_data:/var/www/html
    networks:
      - network
    depends_on:
      - wordpress
    ports:
      - "443:443"
    restart : on-failure

volumes:
  db_data:
  wordpress_data:

networks:
  network:
    driver: bridge
